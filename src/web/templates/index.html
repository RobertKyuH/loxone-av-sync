<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>loxone-av-sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 24px; }
    h1 { font-size: 1.4rem; color: #fff; margin-bottom: 20px; }
    h2 { font-size: 1rem; color: #aaa; margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge.ok { background: #1a3a1a; color: #4caf50; }
    .badge.err { background: #3a1a1a; color: #f44336; }
    .badge.warn { background: #3a2a1a; color: #ff9800; }
    button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; margin-right: 8px; }
    button.primary { background: #2979ff; color: #fff; }
    button.danger { background: #c62828; color: #fff; }
    button.neutral { background: #333; color: #eee; }
    select { background: #222; color: #eee; border: 1px solid #444; border-radius: 6px; padding: 6px 10px; width: 100%; margin-bottom: 10px; }
    .progress { background: #222; border-radius: 4px; height: 8px; overflow: hidden; margin: 8px 0; }
    .progress-bar { height: 100%; background: #2979ff; transition: width 0.5s; }
    .event-list { list-style: none; font-size: 0.82rem; max-height: 220px; overflow-y: auto; }
    .event-list li { padding: 5px 0; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; }
    .time-pill { color: #2979ff; font-family: monospace; }
    .conn-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.85rem; }
    textarea { width: 100%; background: #111; color: #ccc; border: 1px solid #333; border-radius: 6px; padding: 8px; font-family: monospace; font-size: 0.78rem; resize: vertical; }
    .pos { font-family: monospace; font-size: 1.1rem; color: #fff; }
  </style>
</head>
<body>
  <h1>🎬 loxone-av-sync</h1>
  <div class="grid">
    <!-- Left column -->
    <div>
      <div class="card" style="margin-bottom:16px">
        <h2>Scenariusz</h2>
        <select id="scenarioSelect"><option value="">-- wybierz --</option></select>
        <button class="primary" onclick="loadScenario()">Wczytaj</button>
        <button class="primary" onclick="control('start')">▶ Start</button>
        <button class="danger" onclick="control('stop')">■ Stop</button>
        <button class="neutral" onclick="control('reset')">↺ Reset</button>
      </div>
      <div class="card" style="margin-bottom:16px">
        <h2>Odtwarzanie</h2>
        <div class="pos" id="posDisplay">--:--:--</div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
        <div id="playStatus" style="font-size:0.8rem;color:#888;margin-top:4px">Brak danych</div>
      </div>
      <div class="card">
        <h2>Połączenia</h2>
        <div class="conn-row"><span>Kodi</span><span class="badge" id="connKodi">…</span></div>
        <div class="conn-row"><span>Loxone</span><span class="badge" id="connLoxone">…</span></div>
        <div class="conn-row"><span>AudioSerwer</span><span class="badge" id="connAudio">…</span></div>
        <button class="neutral" style="margin-top:8px" onclick="checkConnections()">Testuj</button>
      </div>
    </div>
    <!-- Right column -->
    <div>
      <div class="card" style="margin-bottom:16px">
        <h2>Nadchodzące zdarzenia</h2>
        <ul class="event-list" id="upcomingList"><li style="color:#666">Brak</li></ul>
      </div>
      <div class="card">
        <h2>Historia zdarzeń</h2>
        <ul class="event-list" id="historyList"><li style="color:#666">Brak</li></ul>
      </div>
    </div>
  </div>

  <script>
    function ms2str(ms) {
      const s = Math.floor(ms/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
      return [h,m,s%60].map(x=>String(x).padStart(2,'0')).join(':');
    }

    async function fetchStatus() {
      try {
        const r = await fetch('/api/status'); const d = await r.json();
        if (d.playback) {
          document.getElementById('posDisplay').textContent = ms2str(d.playback.position_ms);
          const pct = d.playback.total_ms ? (d.playback.position_ms/d.playback.total_ms*100) : 0;
          document.getElementById('progressBar').style.width = pct + '%';
          document.getElementById('playStatus').textContent =
            d.playback.playing ? '▶ Odtwarzanie' : (d.playback.paused ? '⏸ Pauza' : '■ Stop');
        }
        const ul = document.getElementById('upcomingList');
        ul.innerHTML = d.upcoming.length ? d.upcoming.map(e =>
          `<li><span>${e.label}</span><span class="time-pill">${e.time}</span></li>`).join('') :
          '<li style="color:#666">Brak nadchodzących</li>';
      } catch(e) {}
    }

    async function fetchLogs() {
      const r = await fetch('/api/logs'); const d = await r.json();
      const ul = document.getElementById('historyList');
      ul.innerHTML = d.length ? d.slice(0,20).map(e =>
        `<li><span>${e.label}</span><span class="time-pill">${e.time}</span></li>`).join('') :
        '<li style="color:#666">Brak</li>';
    }

    async function loadScenarios() {
      const r = await fetch('/api/scenarios'); const d = await r.json();
      const sel = document.getElementById('scenarioSelect');
      sel.innerHTML = '<option value="">-- wybierz --</option>' +
        d.map(s => `<option value="${s.filename}">${s.title} (${s.events} zd.)</option>`).join('');
    }

    async function loadScenario() {
      const f = document.getElementById('scenarioSelect').value;
      if (!f) return alert('Wybierz scenariusz');
      await fetch('/api/load/'+f, {method:'POST'});
    }

    async function control(action) {
      await fetch('/api/control/'+action, {method:'POST'});
    }

    async function checkConnections() {
      const r = await fetch('/api/connections'); const d = await r.json();
      const set = (id, ok) => {
        const el = document.getElementById(id);
        el.textContent = ok ? 'OK' : 'BRAK';
        el.className = 'badge ' + (ok ? 'ok' : 'err');
      };
      set('connKodi', d.kodi); set('connLoxone', d.loxone); set('connAudio', d.audio);
    }

    loadScenarios();
    checkConnections();
    setInterval(fetchStatus, 1000);
    setInterval(fetchLogs, 2000);
    fetchStatus();
  </script>
</body>
</html>
