<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>loxone-av-sync</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#ddd;min-height:100vh}
    h1{font-size:1.2rem;color:#fff;padding:16px 20px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:10px}
    h1 span.sub{font-size:.8rem;color:#555;font-weight:400}
    h2{font-size:.85rem;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
    .layout{display:grid;grid-template-columns:320px 1fr;gap:0;height:calc(100vh - 53px)}
    .sidebar{background:#0f0f1a;border-right:1px solid #1e1e2e;overflow-y:auto;padding:16px}
    .main{padding:16px;overflow-y:auto}
    .card{background:#13131f;border:1px solid #1e1e2e;border-radius:8px;padding:14px;margin-bottom:12px}
    .scenario-list{display:flex;flex-direction:column;gap:6px}
    .scenario-item{background:#0a0a14;border:1px solid #1e1e2e;border-radius:6px;padding:10px 12px;cursor:pointer;transition:border-color .15s}
    .scenario-item:hover{border-color:#2979ff}
    .scenario-item.active{border-color:#2979ff;background:#0d1a33}
    .scenario-item .title{font-size:.9rem;color:#fff;font-weight:500}
    .scenario-item .meta{font-size:.75rem;color:#555;margin-top:3px;display:flex;gap:8px}
    .scenario-item .movie-tag{color:#2979ff}
    .scenario-item .no-movie{color:#c62828}
    .btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:500;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary{background:#2979ff;color:#fff}
    .btn-success{background:#1b5e20;color:#4caf50;border:1px solid #2e7d32}
    .btn-danger{background:#c62828;color:#fff}
    .btn-neutral{background:#1e1e2e;color:#aaa;border:1px solid #2a2a3e}
    .btn-launch{background:#e65100;color:#fff;width:100%;padding:10px;font-size:.9rem;margin-top:8px}
    .badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.72rem;font-weight:600}
    .badge.ok{background:#1a3a1a;color:#4caf50}
    .badge.err{background:#3a1a1a;color:#f44336}
    .conn-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:.82rem}
    .progress{background:#1e1e2e;border-radius:4px;height:6px;overflow:hidden;margin:8px 0}
    .progress-bar{height:100%;background:#2979ff;transition:width .5s}
    .pos{font-family:monospace;font-size:1.3rem;color:#fff}
    .play-status{font-size:.78rem;color:#555;margin-top:4px}
    .event-list{list-style:none;font-size:.8rem;max-height:180px;overflow-y:auto}
    .event-list li{padding:5px 0;border-bottom:1px solid #1a1a2a;display:flex;justify-content:space-between;gap:8px}
    .event-list li .lbl{color:#bbb;flex:1}
    .time-pill{color:#2979ff;font-family:monospace;white-space:nowrap}
    .upload-zone{border:2px dashed #2a2a3e;border-radius:6px;padding:16px;text-align:center;cursor:pointer;transition:border-color .15s}
    .upload-zone:hover{border-color:#2979ff}
    .upload-zone input{display:none}
    .upload-zone .label{font-size:.82rem;color:#666}
    .upload-progress{display:none;margin-top:8px}
    .upload-progress progress{width:100%;height:6px}
    .movie-list{display:flex;flex-direction:column;gap:4px;max-height:150px;overflow-y:auto}
    .movie-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:#0a0a14;border-radius:4px;font-size:.8rem}
    .movie-item .name{color:#bbb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .del-btn{color:#c62828;background:none;border:none;cursor:pointer;padding:0 4px;font-size:.9rem;flex-shrink:0}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .active-banner{background:#0d1a33;border:1px solid #2979ff;border-radius:6px;padding:10px 14px;margin-bottom:12px}
    .active-banner .label{font-size:.72rem;color:#555;text-transform:uppercase;letter-spacing:.05em}
    .active-banner .value{color:#fff;font-size:.95rem;font-weight:500;margin-top:2px}
    .active-banner .movie{color:#2979ff;font-size:.8rem}
    @media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid #1e1e2e}}
  </style>
</head>
<body>
<h1>🎬 loxone-av-sync <span class="sub">DET demo kit</span></h1>
<div class="layout">

  <!-- SIDEBAR: scenariusze -->
  <div class="sidebar">
    <h2>Scenariusze</h2>
    <div class="scenario-list" id="scenarioList"><div style="color:#444;font-size:.8rem">Ładowanie…</div></div>
    <div style="margin-top:12px">
      <div class="upload-zone" onclick="document.getElementById('scenUpload').click()">
        <input type="file" id="scenUpload" accept=".json" onchange="uploadScenario(this)">
        <div class="label">+ Wgraj scenariusz (.json)</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- Aktywny scenariusz -->
    <div class="active-banner" id="activeBanner" style="display:none">
      <div class="label">Aktywny scenariusz</div>
      <div class="value" id="activeTitle">—</div>
      <div class="movie" id="activeMovie"></div>
    </div>

    <div class="grid2">

      <!-- Odtwarzanie -->
      <div class="card">
        <h2>Odtwarzanie</h2>
        <div class="pos" id="posDisplay">--:--:--</div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
        <div class="play-status" id="playStatus">Brak odtwarzania</div>
        <div style="margin-top:10px;display:flex;gap:6px">
          <button class="btn btn-neutral" onclick="control('reset')">↺ Reset</button>
          <button class="btn btn-danger" onclick="control('stop')">■ Stop</button>
        </div>
      </div>

      <!-- Połączenia -->
      <div class="card">
        <h2>Połączenia</h2>
        <div class="conn-row"><span>Kodi</span><span class="badge" id="connKodi">…</span></div>
        <div class="conn-row"><span>Loxone</span><span class="badge" id="connLoxone">…</span></div>
        <div class="conn-row"><span>AudioSerwer</span><span class="badge" id="connAudio">…</span></div>
        <button class="btn btn-neutral" style="margin-top:8px;width:100%" onclick="checkConnections()">Testuj połączenia</button>
      </div>

    </div>

    <div class="grid2">

      <!-- Nadchodzące zdarzenia -->
      <div class="card">
        <h2>Nadchodzące zdarzenia</h2>
        <ul class="event-list" id="upcomingList"><li><span class="lbl" style="color:#444">Brak</span></li></ul>
      </div>

      <!-- Historia -->
      <div class="card">
        <h2>Historia zdarzeń</h2>
        <ul class="event-list" id="historyList"><li><span class="lbl" style="color:#444">Brak</span></li></ul>
      </div>

    </div>

    <!-- Filmy -->
    <div class="card">
      <h2>Filmy na RPi3</h2>
      <div class="movie-list" id="movieList"><div style="color:#444;font-size:.8rem">Ładowanie…</div></div>
      <div style="margin-top:10px">
        <div class="upload-zone" id="movieDropZone" onclick="document.getElementById('movieUpload').click()">
          <input type="file" id="movieUpload" accept=".mp4,.mkv,.avi,.mov,.m4v" onchange="uploadMovie(this)">
          <div class="label" id="movieUploadLabel">+ Wgraj film (MP4, MKV…)</div>
        </div>
        <div class="upload-progress" id="movieUploadProgress">
          <progress id="movieProgressBar" value="0" max="100"></progress>
          <div style="font-size:.75rem;color:#555;margin-top:4px" id="movieProgressText"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ── helpers ───────────────────────────────────────────────────────────────────
function ms2str(ms){
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  return [h,m,s%60].map(x=>String(x).padStart(2,'0')).join(':');
}
async function api(path,opts={}){
  const r=await fetch(path,opts);
  return r.json();
}

// ── scenario list ─────────────────────────────────────────────────────────────
let activeScenario=null;
async function loadScenarios(){
  const list=await api('/api/scenarios');
  const el=document.getElementById('scenarioList');
  if(!list.length){el.innerHTML='<div style="color:#444;font-size:.8rem">Brak scenariuszy</div>';return;}
  el.innerHTML=list.map(s=>`
    <div class="scenario-item${activeScenario===s.filename?' active':''}" onclick="selectScenario('${s.filename}','${escH(s.title)}','${escH(s.movie||'')}')">
      <div class="title">${escH(s.title)}</div>
      <div class="meta">
        <span>${s.events} zd.</span>
        ${s.movie?`<span class="movie-tag">🎬 ${escH(s.movie)}</span>`:'<span class="no-movie">⚠ brak filmu</span>'}
      </div>
    </div>`).join('');
}

function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

async function selectScenario(filename,title,movie){
  if(!confirm(`Uruchomić "${title}"?\n\nFilm: ${movie||'(brak)'}\nScenariusz zostanie wczytany i Kodi rozpocznie odtwarzanie.`)) return;
  const r=await api(`/api/launch/${filename}`,{method:'POST'});
  if(r.ok){
    activeScenario=filename;
    document.getElementById('activeBanner').style.display='block';
    document.getElementById('activeTitle').textContent=title;
    document.getElementById('activeMovie').textContent=movie?'🎬 '+movie:'';
    loadScenarios();
  } else {
    alert('Błąd: '+(r.error||'nieznany'));
  }
}

async function uploadScenario(input){
  const f=input.files[0]; if(!f) return;
  const fd=new FormData(); fd.append('file',f);
  const r=await api('/api/upload/scenario',{method:'POST',body:fd});
  if(r.ok){input.value='';loadScenarios();}
  else alert('Błąd uploadu scenariusza');
}

// ── movie list ────────────────────────────────────────────────────────────────
async function loadMovies(){
  const list=await api('/api/movies');
  const el=document.getElementById('movieList');
  if(!list.length){el.innerHTML='<div style="color:#444;font-size:.8rem">Brak filmów</div>';return;}
  el.innerHTML=list.map(m=>`
    <div class="movie-item">
      <span class="name">🎬 ${escH(m)}</span>
      <button class="del-btn" onclick="deleteMovie('${escH(m)}')">✕</button>
    </div>`).join('');
}

async function deleteMovie(name){
  if(!confirm(`Usunąć "${name}"?`)) return;
  await api(`/api/movies/${encodeURIComponent(name)}`,{method:'DELETE'});
  loadMovies();
}

function uploadMovie(input){
  const f=input.files[0]; if(!f) return;
  const fd=new FormData(); fd.append('file',f);
  const xhr=new XMLHttpRequest();
  document.getElementById('movieUploadProgress').style.display='block';
  document.getElementById('movieUploadLabel').textContent='Wysyłanie…';
  xhr.upload.onprogress=e=>{
    if(e.lengthComputable){
      const pct=Math.round(e.loaded/e.total*100);
      document.getElementById('movieProgressBar').value=pct;
      document.getElementById('movieProgressText').textContent=
        `${pct}% — ${(e.loaded/1024/1024).toFixed(1)} / ${(e.total/1024/1024).toFixed(1)} MB`;
    }
  };
  xhr.onload=()=>{
    document.getElementById('movieUploadProgress').style.display='none';
    document.getElementById('movieUploadLabel').textContent='+ Wgraj film (MP4, MKV…)';
    input.value='';
    loadMovies();
  };
  xhr.open('POST','/api/upload/movie');
  xhr.send(fd);
}

// ── playback status ───────────────────────────────────────────────────────────
async function fetchStatus(){
  try{
    const d=await api('/api/status');
    if(d.playback){
      document.getElementById('posDisplay').textContent=ms2str(d.playback.position_ms);
      const pct=d.playback.total_ms?(d.playback.position_ms/d.playback.total_ms*100):0;
      document.getElementById('progressBar').style.width=pct+'%';
      document.getElementById('playStatus').textContent=
        d.playback.playing?'▶ Odtwarzanie':d.playback.paused?'⏸ Pauza':'■ Stop';
    }
    if(d.scenario && !activeScenario){
      activeScenario=d.scenario.filename;
      document.getElementById('activeBanner').style.display='block';
      document.getElementById('activeTitle').textContent=d.scenario.title;
      document.getElementById('activeMovie').textContent=d.scenario.movie?'🎬 '+d.scenario.movie:'';
    }
    const ul=document.getElementById('upcomingList');
    ul.innerHTML=d.upcoming.length?d.upcoming.map(e=>
      `<li><span class="lbl">${escH(e.label)}</span><span class="time-pill">${e.time}</span></li>`).join(''):
      '<li><span class="lbl" style="color:#444">Brak nadchodzących</span></li>';
  }catch(e){}
}

async function fetchLogs(){
  try{
    const d=await api('/api/logs');
    const ul=document.getElementById('historyList');
    ul.innerHTML=d.length?d.slice(0,20).map(e=>
      `<li><span class="lbl">${escH(e.label)}</span><span class="time-pill">${e.time}</span></li>`).join(''):
      '<li><span class="lbl" style="color:#444">Brak</span></li>';
  }catch(e){}
}

async function control(action){
  await api('/api/control/'+action,{method:'POST'});
  if(action==='stop') activeScenario=null;
}

async function checkConnections(){
  const d=await api('/api/connections');
  const set=(id,ok)=>{
    const el=document.getElementById(id);
    el.textContent=ok?'OK':'BRAK';
    el.className='badge '+(ok?'ok':'err');
  };
  set('connKodi',d.kodi);set('connLoxone',d.loxone);set('connAudio',d.audio);
}

// ── init ──────────────────────────────────────────────────────────────────────
loadScenarios();
loadMovies();
checkConnections();
fetchStatus();
setInterval(fetchStatus,1000);
setInterval(fetchLogs,2000);
setInterval(()=>{loadScenarios();loadMovies();},15000);
</script>
</body>
</html>
